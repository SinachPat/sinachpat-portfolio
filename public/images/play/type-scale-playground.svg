  <rect x="1360" y="690" width="76" height="28" rx="6" fill="#0ABFBC" opacity="0.15"/>
  <rect x="1360" y="690" width="76" height="28" rx="6" stroke="#0ABFBC" stroke-width="1" opacity="0.4"/>
